<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Read and Say Storymaker Recreation</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link href="css/normalize.css" rel="stylesheet" />
        <link href="css/styles.css" rel="stylesheet" />
        <script src="js/script.js" defer></script>
    </head>
    <body>
        <header>
            <h1>See and Say Storymaker Recreation</h1>
            <h2>Click the buttons  below to create a story</h2>
        </header>
        <main>
            <div id="builder">
                <section id="options">
                    <h3>Options:</h3>
                    <div class="purp">
                        <h3>1. Noun</h3>
                        <ol id="options1">

                        </ol>
                    </div>
                    <div class="blue">
                        <h3>2. Verb</h3>
                        <ol id="options2">
                            
                        </ol>
                    </div>
                    <div class="green">
                        <h3>3. Adjective</h3>
                        <ol id="options3">
                            
                        </ol>
                    </div>
                    <div class="orange">
                        <h3>4. Noun</h3>
                        <ol id="options4">
                            
                        </ol>
                    </div>
                    <div class="pink">
                        <h3>5. Ending Noun</h3>
                        <ol id="options5">
                            
                        </ol>
                    </div>
                </section>
                <section id="buttons">
                    <h3>Click to change:</h3>
                    <button class="purp">Change 1</button>
                    <button class="blue">Change 2</button>
                    <button class="green">Change 3</button>
                    <button class="orange">Change 4</button>
                    <button class="pink">Change 5</button>
                    <a id="submit" href="">Submit</a>
                    <a id="random" href="">Random Story</a>
                </section>
                <section id="choices">
                    <h3>Current Choices:</h3>
                    <ol>
                        <li id="choice1" class="purp"></li>
                        <li id="choice2" class="blue"></li>
                        <li id="choice3" class="green"></li>
                        <li id="choice4" class="orange"></li>
                        <li id="choice5" class="pink"></li>
                    </ol>
                </section>
                <section>
                    <h3>Your Story:</h3>
                    <p id="story"></p>
                </section>
            </div>
        </main>
    </body>
</html>
